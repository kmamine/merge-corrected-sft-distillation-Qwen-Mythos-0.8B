# Merge-corrected SFT distillation config. Overrides distill/config.py defaults.
# Override at launch with:  --set key=value   (e.g. --set num_epochs=1 max_samples=200)

# ---- model (SFT this instruct checkpoint; the merge soups back toward it) ----
instruct_model: Qwen/Qwen3.5-0.8B       # SFT start + frozen merge anchor + baseline
attn_implementation: sdpa
gradient_checkpointing: true            # on (cuda:0 is shared on this box)

# ---- distillation data ----
dataset: WithinUsAI/claude_mythos_distilled_25k
dataset_split: train
max_samples: -1                         # <=0 = all (~25k); set small for smoke
max_seq_len: 2048
packing: false

# ---- SFT (full fine-tune by default; set use_lora=true for a budget run) ----
use_lora: false
num_epochs: 3                           # E = number of merge-corrected rounds
per_device_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler: cosine
max_grad_norm: 1.0
seed: 42

# ---- merge corrections compared per epoch (all anchored on instruct; delta = sft - instruct) ----
merge_methods: linear,ties,dare_linear,dare_ties,slerp,breadcrumbs,della
merge_alpha: 0.5                        # scale on the task vector (1.0 == sft)
ties_density: 0.7                       # TIES/breadcrumbs keep-fraction
dare_drop_p: 0.5                        # DARE/della base drop fraction
slerp_t: 0.5                            # SLERP factor instruct(0)->sft(1)
breadcrumbs_gamma: 0.1                  # breadcrumbs top-outlier drop fraction
della_epsilon: 0.1                      # della drop-prob spread by magnitude rank

# ---- benchmarks (lm-evaluation-harness) ----
eval_tasks: gsm8k,mmlu,arc_challenge
eval_limit: 64                          # in-loop per-task cap (mmlu = 57 subtasks); final eval uses full
eval_batch_size: 8

# ---- io / logging ----
output_dir: outputs/distill
logging_steps: 10

# ---- mlflow ----
mlflow_experiment: mythos-distill
mlflow_tracking_uri: http://localhost:5000
run_name: merge-corrected-sft
