# mergekit DARE-TIES config — stochastic drop + rescale on top of TIES. Often the
# best choice when CPT moved the weights a lot (large parameter divergence).
#
#   mergekit-yaml configs/merge_dare_ties.yaml outputs/merged_dare --cuda

merge_method: dare_ties
base_model: Qwen/Qwen2.5-0.5B
models:
  - model: Qwen/Qwen2.5-0.5B-Instruct
    parameters:
      weight: 1.0
      density: 0.9
  - model: outputs/cpt/cpt_full
    parameters:
      weight: 0.6
      density: 0.5            # DARE drops ~half the delta then rescales
parameters:
  normalize: true
  int8_mask: true
dtype: bfloat16
tokenizer_source: Qwen/Qwen2.5-0.5B-Instruct
